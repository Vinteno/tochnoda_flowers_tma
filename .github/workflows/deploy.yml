name: Deploy Frontend to Production

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  BUN_VERSION: 'latest'
  DEPLOY_PATH: '/var/www/evergreen-flowers'

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-24.04

    steps:
      # ========================================
      # 1. Checkout кода
      # ========================================
      - name: Checkout code
        uses: actions/checkout@v6

      # ========================================
      # 2. Установка Bun
      # ========================================
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # ========================================
      # 3. Установка зависимостей
      # ========================================
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ========================================
      # 4. Сборка проекта
      # ========================================
      - name: Build project
        run: bun run build
        env:
          VITE_API_URL: https://admin.evergreen-flowers.ru/api/v1

      # ========================================
      # 5. Настройка SSH
      # ========================================
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # ========================================
      # 6. Деплой через rsync
      # ========================================
      - name: Deploy to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      # ========================================
      # 7. Установка прав на сервере
      # ========================================
      - name: Set permissions
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' << 'ENDSSH'
          sudo chown -R www-data:www-data /var/www/evergreen-flowers
          sudo chmod -R 755 /var/www/evergreen-flowers
          echo "Frontend deploy completed!"
          ENDSSH

      # ========================================
      # 8. Очистка SSH ключа
      # ========================================
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
