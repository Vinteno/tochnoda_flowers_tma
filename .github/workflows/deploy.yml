name: Deploy Frontend to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  BUN_VERSION: 'latest'
  DEPLOY_PATH: '/var/www/iris-tma'

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # Исправление прав ПЕРЕД rsync
      - name: Fix permissions before deploy
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'sudo chown -R ${{ secrets.SSH_USER }}:www-data /var/www/iris-tma'

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      # Возврат прав для Nginx ПОСЛЕ rsync
      - name: Set permissions after deploy
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' << 'ENDSSH'
          sudo chown -R www-data:www-data /var/www/iris-tma
          sudo chmod -R 755 /var/www/iris-tma
          echo "Frontend deploy completed!"
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key